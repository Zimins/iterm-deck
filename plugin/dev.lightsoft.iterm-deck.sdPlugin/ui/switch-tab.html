<!doctype html>
<html>
  <head lang="en">
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Tab Name">
      <sdpi-textfield
        setting="tabName"
        placeholder="e.g. dev, server, logs"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Profile Name (optional)">
      <sdpi-textfield
        setting="profileName"
        placeholder="e.g. Default"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Command (optional)">
      <sdpi-textfield
        setting="command"
        placeholder="e.g. npm run dev"
      ></sdpi-textfield>
    </sdpi-item>
  </body>
</html>
